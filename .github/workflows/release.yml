name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.1.0). Leave blank to auto-increment version.'
        required: false
        type: string
      build_windows:
        description: 'Build for Windows'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build for macOS'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build for Linux'
        required: true
        default: true
        type: boolean
      draft:
        description: 'Publish as draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_SLUG: markra
  APP_PRODUCT_NAME: Markra
  DESKTOP_DIR: apps/desktop
  NODE_VERSION: 24
  PNPM_VERSION: 10.30.3

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.tag.outputs.name }}
      matrix: ${{ steps.matrix.outputs.config }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Determine Tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -z "${{ inputs.tag_name }}" ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            pnpm install --frozen-lockfile
            pnpm release patch --yes
            NEW_TAG="v$(node -p "require('./package.json').version")"
            git push origin main --follow-tags
            echo "name=$NEW_TAG" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          JSON='{"include":['
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.build_windows }}" == "true" ]]; then
            JSON+='{"name":"Windows (x64)","artifact_name":"Windows-x64","os":"windows-latest","target":"x86_64-pc-windows-msvc","asset_platform":"windows","asset_arch":"x64","updater_platform":"windows-x86_64","args":"--target x86_64-pc-windows-msvc"},'
          fi
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.build_macos }}" == "true" ]]; then
            JSON+='{"name":"macOS (Apple Silicon)","artifact_name":"macOS-apple-silicon","os":"macos-15","target":"aarch64-apple-darwin","asset_platform":"macos","asset_arch":"arm64","updater_platform":"darwin-aarch64","args":"--target aarch64-apple-darwin"},'
            JSON+='{"name":"macOS (Intel)","artifact_name":"macOS-intel","os":"macos-15-intel","target":"x86_64-apple-darwin","asset_platform":"macos","asset_arch":"x64","updater_platform":"darwin-x86_64","args":"--target x86_64-apple-darwin"},'
          fi
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.build_linux }}" == "true" ]]; then
            JSON+='{"name":"Linux (x64)","artifact_name":"Linux-x64","os":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","asset_platform":"linux","asset_arch":"x64","updater_platform":"linux-x86_64","args":"--target x86_64-unknown-linux-gnu"},'
          fi
          JSON="${JSON%,}]}"
          if [[ "$JSON" == '{"include":]}' ]]; then
            echo "Error: No platforms selected for build."
            exit 1
          fi
          echo "config=$JSON" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout release scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .release-scripts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const desktopDir = process.env.DESKTOP_DIR;
          const desktopPackageJson = JSON.parse(fs.readFileSync(`${desktopDir}/package.json`, "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync(`${desktopDir}/src-tauri/tauri.conf.json`, "utf8"));
          const cargoToml = fs.readFileSync(`${desktopDir}/src-tauri/Cargo.toml`, "utf8");
          const cargoVersion = cargoToml.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const tagName = process.env.RELEASE_TAG;
          const expectedTag = `v${packageJson.version}`;

          if (tagName !== expectedTag) {
            throw new Error(`Release tag ${tagName} does not match package version ${expectedTag}.`);
          }

          if (desktopPackageJson.version !== packageJson.version) {
            throw new Error(`Desktop package version ${desktopPackageJson.version} does not match package version ${packageJson.version}.`);
          }

          if (tauriConfig.version !== packageJson.version) {
            throw new Error(`Tauri version ${tauriConfig.version} does not match package version ${packageJson.version}.`);
          }

          if (cargoVersion !== packageJson.version) {
            throw new Error(`Cargo version ${cargoVersion} does not match package version ${packageJson.version}.`);
          }
          NODE

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.DESKTOP_DIR }}/src-tauri -> target
          cache-bin: false

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare updater config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const desktopDir = process.env.DESKTOP_DIR;
          const endpoint = process.env.TAURI_UPDATER_ENDPOINT;
          const privateKey = process.env.TAURI_SIGNING_PRIVATE_KEY?.trim();
          const publicKey = process.env.TAURI_UPDATER_PUBLIC_KEY?.trim();

          if (!privateKey) {
            throw new Error("Missing TAURI_SIGNING_PRIVATE_KEY repository secret for signed updater artifacts.");
          }

          if (!publicKey) {
            throw new Error("Missing TAURI_UPDATER_PUBLIC_KEY repository secret for updater verification.");
          }

          const updaterConfig = {
            bundle: {
              createUpdaterArtifacts: true
            },
            plugins: {
              updater: {
                endpoints: [endpoint],
                pubkey: publicKey,
                windows: {
                  installMode: "passive"
                }
              }
            }
          };

          fs.writeFileSync(path.join(desktopDir, "tauri.updater.conf.json"), `${JSON.stringify(updaterConfig, null, 2)}\n`);
          NODE

      - name: Build and bundle app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.DESKTOP_DIR }}
          args: ${{ matrix.args }} --config tauri.updater.conf.json

      - name: Add macOS open helper to DMG
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        env:
          APP_PRODUCT_NAME: ${{ env.APP_PRODUCT_NAME }}
          DMG_DIR: ${{ env.DESKTOP_DIR }}/src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          HELPER_PATH: ${{ runner.temp }}/Markra-macOS-Open-Anyway.command
          MACOS_BUNDLE_DIR: ${{ env.DESKTOP_DIR }}/src-tauri/target/${{ matrix.target }}/release/bundle/macos
        run: |
          set -euo pipefail

          OUTPUT_PATH="${HELPER_PATH}" node .release-scripts/scripts/release/create-macos-open-helper.mjs
          node .release-scripts/scripts/release/rebuild-macos-dmg-with-helper.mjs

      - name: Normalize release asset names
        shell: bash
        env:
          ASSET_ARCH: ${{ matrix.asset_arch }}
          ASSET_PLATFORM: ${{ matrix.asset_platform }}
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
          TARGET: ${{ matrix.target }}
        run: node .release-scripts/scripts/release/normalize-release-artifacts.mjs

      - name: Collect bundle paths
        id: bundle_paths
        shell: bash
        env:
          ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
          DESKTOP_DIR: ${{ env.DESKTOP_DIR }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const artifactPathsJson = process.env.ARTIFACT_PATHS_JSON || "[]";
          const desktopDir = process.env.DESKTOP_DIR;
          const target = process.env.TARGET;
          const bundleRoot = path.join(desktopDir, "src-tauri", "target", target, "release", "bundle");
          const artifactPaths = [];
          const seen = new Set();

          function addArtifact(filePath) {
            if (!filePath) return;
            if (filePath.endsWith("/latest.json") || filePath.endsWith("\\latest.json")) return;

            let artifactPath = filePath;
            if (!path.isAbsolute(artifactPath) && !fs.existsSync(artifactPath)) {
              artifactPath = path.join(desktopDir, artifactPath);
            }

            try {
              if (!fs.statSync(artifactPath).isFile()) return;
              artifactPath = fs.realpathSync(artifactPath);
            } catch {
              return;
            }

            if (!seen.has(artifactPath)) {
              seen.add(artifactPath);
              artifactPaths.push(artifactPath);
            }
          }

          function collectBundleFiles(root) {
            if (!fs.existsSync(root)) return;

            const stack = [root];
            const releaseFileSuffixes = [
              ".app.tar.gz",
              ".AppImage",
              ".deb",
              ".dmg",
              ".exe",
              ".msi",
              ".rpm",
              ".sig",
              ".tar.gz",
              ".zip",
            ];

            function isReleaseFile(fileName) {
              return releaseFileSuffixes.some((suffix) => fileName.endsWith(suffix));
            }

            while (stack.length > 0) {
              const current = stack.pop();
              const entries = fs.readdirSync(current, { withFileTypes: true });

              for (const entry of entries) {
                const entryPath = path.join(current, entry.name);

                if (entry.isDirectory()) {
                  stack.push(entryPath);
                  continue;
                }

                if (isReleaseFile(entry.name)) {
                  addArtifact(entryPath);
                }
              }
            }
          }

          try {
            const parsed = JSON.parse(artifactPathsJson);
            if (Array.isArray(parsed)) {
              for (const candidate of parsed) {
                if (typeof candidate === "string") addArtifact(candidate);
              }
            }
          } catch {
            // Fall back to walking the Tauri bundle directory below.
          }

          collectBundleFiles(bundleRoot);

          if (artifactPaths.length === 0) {
            throw new Error("No release bundle artifacts were found.");
          }

          artifactPaths.sort();
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `paths<<__PATHS__\n${artifactPaths.join("\n")}\n__PATHS__\n`);
          NODE

      - name: Create updater metadata
        shell: bash
        env:
          ARTIFACT_PATHS_RAW: ${{ steps.bundle_paths.outputs.paths }}
          UPDATER_PLATFORM: ${{ matrix.updater_platform }}
        run: node .release-scripts/scripts/release/create-updater-metadata.mjs

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_SLUG }}-${{ matrix.artifact_name }}-bundles
          path: |
            ${{ steps.bundle_paths.outputs.paths }}
            release-metadata.json
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build, prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout release scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .release-scripts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine changelog range
        id: changelog_range
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="$(git describe --tags --abbrev=0 "HEAD^" 2>/dev/null || true)"

          if [[ -n "${previous_tag}" ]]; then
            echo "from_ref=${previous_tag}" >> "${GITHUB_OUTPUT}"
          else
            first_commit="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            echo "from_ref=${first_commit}" >> "${GITHUB_OUTPUT}"
          fi

          echo "to_ref=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          pnpm dlx changelogen@latest \
            --from "${{ steps.changelog_range.outputs.from_ref }}" \
            --to "${{ steps.changelog_range.outputs.to_ref }}" \
            --no-output \
            > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            {
              echo "## Changes"
              echo
              echo "- Release ${RELEASE_TAG}"
            } > release-notes.md
          fi

      - name: Add macOS unsigned app notice
        run: node .release-scripts/scripts/release/prepend-macos-unsigned-notice.mjs

      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_SLUG }}-*-bundles
          path: release-assets

      - name: Generate updater manifest
        env:
          EXPECTED_UPDATER_PLATFORMS: darwin-aarch64,darwin-x86_64,linux-x86_64,windows-x86_64
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_ASSETS_ROOT: release-assets
          RELEASE_NOTES_PATH: release-notes.md
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          export RELEASE_VERSION="${RELEASE_VERSION#v}"
          node .release-scripts/scripts/release/generate-updater-manifest.mjs

      - name: Collect release files
        id: release_files
        shell: bash
        run: |
          set -euo pipefail

          find release-assets -type f ! -name 'release-metadata.json' | sort > release-files.txt

          {
            echo 'paths<<__FILES__'
            cat release-files.txt
            echo '__FILES__'
          } >> "${GITHUB_OUTPUT}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.APP_PRODUCT_NAME }} ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: ${{ steps.release_files.outputs.paths }}
